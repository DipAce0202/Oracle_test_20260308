name: Launch Oracle Ampere (Python SDK)

on:
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Max retries for capacity errors'
        required: false
        default: '20'

jobs:
  launch-instance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup OCI Config Directory
        run: |
          mkdir -p ~/.oci
          chmod 700 ~/.oci

      - name: Write OCI Private Key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Run Python Automation
        env:
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          MY_PUBLIC_SSH_KEY: ${{ secrets.MY_PUBLIC_SSH_KEY }}
        run: python3 launch_ampere.py
